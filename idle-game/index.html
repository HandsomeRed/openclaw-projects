<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ 勇者放置冒险 - OpenClaw Projects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #4a4a6a;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        header p {
            color: #aaa;
            font-size: 1.1em;
        }

        .game-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .game-area {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .panel h2 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #ffd700;
            border-bottom: 1px solid #4a4a6a;
            padding-bottom: 10px;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .stat {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #4ecdc4;
        }

        .battle-log {
            height: 300px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 5px;
            border-radius: 5px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-entry.combat { background: rgba(255,100,100,0.2); }
        .log-entry.loot { background: rgba(255,215,0,0.2); }
        .log-entry.gain { background: rgba(78,205,196,0.2); }
        .log-entry.level { background: rgba(150,100,255,0.2); }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(78,205,196,0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,107,107,0.4);
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            font-weight: bold;
        }

        .equipment-list {
            display: grid;
            gap: 10px;
        }

        .equipment-item {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .equipment-name {
            font-weight: bold;
            color: #ffd700;
        }

        .equipment-stat {
            color: #4ecdc4;
            font-size: 0.9em;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            border-top: 1px solid #4a4a6a;
            margin-top: 30px;
        }

        .offline-gains {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .offline-gains.show {
            display: block;
            animation: pulse 1s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ 勇者放置冒险</h1>
            <p>OpenClaw 学习项目 - 放置挂机游戏 Demo</p>
        </header>

        <div id="offlineGains" class="offline-gains">
            <h2>🎁 离线收益</h2>
            <p id="offlineText"></p>
        </div>

        <div class="game-area">
            <div class="panel">
                <h2>👤 勇者信息</h2>
                <div class="hero-stats">
                    <div class="stat">
                        <div class="stat-label">等级</div>
                        <div class="stat-value" id="level">1</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">攻击力</div>
                        <div class="stat-value" id="attack">10</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">金币</div>
                        <div class="stat-value" id="gold">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">击败怪物</div>
                        <div class="stat-value" id="kills">0</div>
                    </div>
                </div>

                <h3 style="margin: 20px 0 10px;">经验值</h3>
                <div class="progress-bar">
                    <div class="progress-fill" id="expBar" style="width: 0%;">0%</div>
                </div>

                <h3 style="margin: 20px 0 10px;">🎒 装备</h3>
                <div class="equipment-list" id="equipmentList">
                    <div class="equipment-item">
                        <span class="equipment-name">🗡️ 武器</span>
                        <span class="equipment-stat" id="weapon">无</span>
                    </div>
                    <div class="equipment-item">
                        <span class="equipment-name">🛡️ 防具</span>
                        <span class="equipment-stat" id="armor">无</span>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="game.manualAttack()">⚔️ 手动攻击</button>
                    <button class="btn btn-danger" onclick="game.resetGame()">🔄 重置</button>
                </div>
            </div>

            <div class="panel">
                <h2>⚔️ 战斗日志</h2>
                <div class="battle-log" id="battleLog">
                    <div class="log-entry gain">欢迎来到勇者放置冒险！</div>
                    <div class="log-entry">点击"手动攻击"开始战斗，或等待自动战斗...</div>
                </div>
            </div>
        </div>

        <footer>
            <p>
                Made with ❤️ by <strong>TinyRed</strong> & OpenClaw AI Assistant<br>
                OpenClaw Learning Project | 数据自动保存在本地
            </p>
        </footer>
    </div>

    <script>
        const game = {
            data: {
                level: 1,
                exp: 0,
                expToNext: 100,
                attack: 10,
                gold: 0,
                kills: 0,
                weapon: null,
                armor: null,
                lastSave: Date.now()
            },

            monsters: [
                { name: '史莱姆', hp: 30, exp: 10, gold: 5 },
                { name: '哥布林', hp: 50, exp: 20, gold: 10 },
                { name: '骷髅兵', hp: 80, exp: 35, gold: 18 },
                { name: '兽人', hp: 120, exp: 50, gold: 25 },
                { name: '食人魔', hp: 200, exp: 80, gold: 40 },
                { name: '黑暗骑士', hp: 350, exp: 150, gold: 75 },
                { name: '巨龙', hp: 1000, exp: 500, gold: 250 }
            ],

            equipment: [
                { name: '铁剑', type: 'weapon', attack: 5, minLevel: 2 },
                { name: '钢剑', type: 'weapon', attack: 12, minLevel: 5 },
                { name: '秘银剑', type: 'weapon', attack: 25, minLevel: 10 },
                { name: '龙刃', type: 'weapon', attack: 50, minLevel: 20 },
                { name: '皮甲', type: 'armor', defense: 3, minLevel: 2 },
                { name: '锁子甲', type: 'armor', defense: 8, minLevel: 5 },
                { name: '板甲', type: 'armor', defense: 18, minLevel: 10 },
                { name: '龙鳞甲', type: 'armor', defense: 35, minLevel: 20 }
            ],

            init() {
                this.loadGame();
                this.checkOfflineGains();
                this.updateUI();
                this.startAutoBattle();
            },

            loadGame() {
                const saved = localStorage.getItem('idleGameSave');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    this.data = { ...this.data, ...parsed };
                }
            },

            saveGame() {
                this.data.lastSave = Date.now();
                localStorage.setItem('idleGameSave', JSON.stringify(this.data));
            },

            checkOfflineGains() {
                const now = Date.now();
                const offlineTime = now - this.data.lastSave;
                const offlineHours = Math.floor(offlineTime / (1000 * 60 * 60));

                if (offlineHours > 0) {
                    const offlineGold = offlineHours * this.data.attack * 2;
                    const offlineExp = offlineHours * this.data.level * 10;

                    this.data.gold += offlineGold;
                    this.addExp(offlineExp);

                    const gainsEl = document.getElementById('offlineGains');
                    const textEl = document.getElementById('offlineText');
                    textEl.innerHTML = `离线 ${offlineHours} 小时<br>获得 💰${offlineGold} 金币 | ✨${offlineExp} 经验`;
                    gainsEl.classList.add('show');

                    this.log(`离线收益：💰${offlineGold} 金币 | ✨${offlineExp} 经验`, 'gain');
                }
            },

            startAutoBattle() {
                setInterval(() => {
                    this.autoBattle();
                }, 2000);
            },

            autoBattle() {
                const monster = this.getRandomMonster();
                const damage = this.data.attack;
                const turns = Math.ceil(monster.hp / damage);

                this.log(`遭遇 ${monster.name} (HP:${monster.hp})`, 'combat');

                setTimeout(() => {
                    this.data.gold += monster.gold;
                    this.addExp(monster.exp);
                    this.data.kills++;
                    this.log(`击败了 ${monster.name}！获得 💰${monster.gold} ✨${monster.exp}`, 'gain');

                    this.checkEquipmentDrop();
                    this.checkLevelUp();
                    this.updateUI();
                    this.saveGame();
                }, 500);
            },

            manualAttack() {
                const monster = this.getRandomMonster();
                const damage = this.data.attack * 2;

                this.log(`💥 会心一击！对 ${monster.name} 造成 ${damage} 点伤害`, 'combat');
                this.data.gold += monster.gold;
                this.addExp(monster.exp * 1.5);
                this.data.kills++;

                setTimeout(() => {
                    this.log(`击败了 ${monster.name}！获得 💰${monster.gold} ✨${Math.floor(monster.exp * 1.5)}`, 'gain');
                    this.checkEquipmentDrop();
                    this.checkLevelUp();
                    this.updateUI();
                    this.saveGame();
                }, 300);
            },

            getRandomMonster() {
                const maxIndex = Math.min(Math.floor(this.data.level / 3), this.monsters.length - 1);
                const index = Math.floor(Math.random() * (maxIndex + 1));
                const base = this.monsters[index];
                return {
                    ...base,
                    hp: base.hp * (1 + this.data.level * 0.1)
                };
            },

            checkEquipmentDrop() {
                if (Math.random() > 0.3) return;

                const available = this.equipment.filter(eq =>
                    eq.minLevel <= this.data.level &&
                    (!this.data[eq.type] || this.getStat(eq.type) < eq[eq.type === 'weapon' ? 'attack' : 'defense'])
                );

                if (available.length === 0) return;

                const drop = available[Math.floor(Math.random() * available.length)];
                const statName = drop.type === 'weapon' ? '攻击力' : '防御力';
                const statValue = drop.type === 'weapon' ? drop.attack : drop.defense;

                this.log(`🎁 发现装备：${drop.name} (+${statValue}${statName})`, 'loot');

                if (confirm(`获得 ${drop.name} (+${statValue}${statName})\n要装备吗？`)) {
                    this.data[drop.type] = drop.name;
                    if (drop.type === 'weapon') {
                        this.data.attack += drop.attack;
                    }
                    this.log(`装备了 ${drop.name}！`, 'gain');
                }
            },

            getStat(type) {
                const eq = this.equipment.find(e => e.name === this.data[type]);
                return eq ? eq[type === 'weapon' ? 'attack' : 'defense'] : 0;
            },

            addExp(amount) {
                this.data.exp += Math.floor(amount);
                while (this.data.exp >= this.data.expToNext) {
                    this.data.exp -= this.data.expToNext;
                    this.data.level++;
                    this.data.expToNext = Math.floor(this.data.expToNext * 1.5);
                    this.data.attack += 5;
                    this.log(`🎉 升级了！当前等级 ${this.data.level}`, 'level');
                }
            },

            checkLevelUp() {
                // Handled in addExp
            },

            updateUI() {
                document.getElementById('level').textContent = this.data.level;
                document.getElementById('attack').textContent = this.data.attack;
                document.getElementById('gold').textContent = this.data.gold;
                document.getElementById('kills').textContent = this.data.kills;

                const expPercent = (this.data.exp / this.data.expToNext * 100).toFixed(1);
                document.getElementById('expBar').style.width = expPercent + '%';
                document.getElementById('expBar').textContent = expPercent + '%';

                document.getElementById('weapon').textContent = this.data.weapon || '无';
                document.getElementById('armor').textContent = this.data.armor || '无';
            },

            log(message, type = '') {
                const logEl = document.getElementById('battleLog');
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;
                const time = new Date().toLocaleTimeString();
                entry.textContent = `[${time}] ${message}`;
                logEl.insertBefore(entry, logEl.firstChild);

                while (logEl.children.length > 50) {
                    logEl.removeChild(logEl.lastChild);
                }
            },

            resetGame() {
                if (confirm('确定要重置游戏进度吗？')) {
                    localStorage.removeItem('idleGameSave');
                    location.reload();
                }
            }
        };

        game.init();
    </script>
</body>
</html>
